<!DOCTYPE html>
<html>
<body style="background:#FDF6EC; padding:40px;">
<h3 style="color:#5C3D1E; margin-bottom:20px; font-family:Georgia;">Spiral logo preview</h3>
<div style="background:#1A1208; padding:16px 24px; border-radius:8px; display:inline-flex; align-items:center; gap:10px;">
  <svg id="logo" width="36" height="36" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" fill="#E8530A"/>
  </svg>
  <span style="color:#E8530A; font-size:1.4rem; font-weight:900; font-family:Georgia,serif; letter-spacing:-0.5px;">Jalebi Bros</span>
</div>

<script>
const svg = document.getElementById('logo');

// Generate Archimedean spiral points
function generateSpiral(cx, cy, turns, maxR, steps) {
  let points = [];
  let totalAngle = turns * 2 * Math.PI;
  for (let i = 0; i <= steps; i++) {
    let t = i / steps;
    let angle = -Math.PI/2 + t * totalAngle; // start from top
    let r = 1 + t * maxR;
    let x = cx + r * Math.cos(angle);
    let y = cy + r * Math.sin(angle);
    points.push(`${x.toFixed(2)},${y.toFixed(2)}`);
  }
  return `M ${points.join(' L ')}`;
}

const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
path.setAttribute('d', generateSpiral(50, 50, 3.2, 36, 500));
path.setAttribute('fill', 'none');
path.setAttribute('stroke', '#FDF6EC');
path.setAttribute('stroke-width', '5.5');
path.setAttribute('stroke-linecap', 'round');
svg.appendChild(path);
</script>
</body>
</html>
